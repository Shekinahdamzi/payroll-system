<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary p-3 d-flex justify-content-between">
    <h4 class="text-white">Employee Payroll System</h4>

    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">

    <div class="card p-4 shadow mb-4">
        <h5>Add Employee</h5>

        <form method="POST" class="row g-3">
            <div class="col-md-4">
                <input class="form-control" name="id" placeholder="Employee ID" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" name="name" placeholder="Name" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" name="position" placeholder="Position" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" name="salary" placeholder="Salary" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" name="allowance" placeholder="Allowance" required>
            </div>

            <div class="col-md-4">
                <input class="form-control" name="tax" placeholder="Tax" required>
            </div>

            <div class="col-12">
                <button class="btn btn-success">Add Employee</button>
            </div>
        </form>
    </div>

    <div class="card p-4 shadow">
        <h5>Employee Records</h5>

        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Name</th><th>Position</th>
                    <th>Salary</th><th>Allowance</th><th>Tax</th><th>Net</th><th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp[0] }}</td>
                    <td>{{ emp[1] }}</td>
                    <td>{{ emp[2] }}</td>
                    <td>{{ emp[3] }}</td>
                    <td>{{ emp[4] }}</td>
                    <td>{{ emp[5] }}</td>
                    <td>{{ emp[6] }}</td>
                  
                    <td>
    <a href="/payslip/{{ emp[0] }}" class="btn btn-sm btn-primary">
        Generate Payslip
    </a>
</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
